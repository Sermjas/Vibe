services:
  vibe_bot:
    build: .
    container_name: vibe_bot
    restart: unless-stopped
    env_file:
      - .env.docker
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import pathlib,sys; cmd=pathlib.Path('/proc/1/cmdline').read_bytes(); sys.exit(0 if b'python' in cmd else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "1"
    volumes:
      - vibe_data:/app/data
      - /etc/localtime:/etc/localtime:ro

volumes:
  vibe_data: