services:
  vibe_bot:
    build: .
    container_name: vibe_bot
    restart: unless-stopped
    env_file:
      - .env.docker
    mem_limit: 512m
    cpus: 0.5
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import pathlib,sys; cmd=pathlib.Path('/proc/1/cmdline').read_bytes(); sys.exit(0 if b'python' in cmd else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "1"
    volumes:
      - vibe_data:/app/data
      - /etc/localtime:/etc/localtime:ro

  # Отдельный infra-сервис. Не связан с бизнес-логикой бота.
  # Вариант для запуска ВНУТРИ Compose требует:
  # - доступа к Docker сокету (для prune)
  # - корректного пути для проверки диска (обычно "/" на хосте; можно смонтировать хостовый FS и проверять его)
  disk_monitor:
    build: .
    container_name: vibe_disk_monitor
    restart: unless-stopped
    env_file:
      - .env.docker
    command: ["python", "-m", "vibe.infra.disk_monitor"]
    volumes:
      - vibe_data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /etc/localtime:/etc/localtime:ro
    # Если хотите мониторить именно хостовую файловую систему, добавьте bind-mount, например:
    # - /:/host:ro
    # и установите DISK_MONITOR_PATH=/host
    mem_limit: 128m
    cpus: 0.2

volumes:
  vibe_data: